<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>AUR Batch PRO (BSC)</title>

<!-- Ethers UMD correto -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.12.0/dist/ethers.umd.min.js"></script>

<style>
body { background:#0b1220; color:#e5ecff; font-family:system-ui; padding:20px; }
.card { background:#0f172a; padding:15px; border-radius:10px; margin-bottom:15px; }
input, textarea { width:100%; padding:10px; margin-top:5px; background:#0b1020; color:white; border:1px solid #1e293b; border-radius:8px; }
button { margin-top:10px; padding:10px; border:none; border-radius:8px; cursor:pointer; }
.green { background:#22c55e; }
.blue { background:#2563eb; }
.red { background:#ef4444; }
.log { height:150px; overflow:auto; background:#000; padding:10px; font-size:12px; white-space:pre-wrap; }
</style>
</head>

<body>

<h2>AUR Batch Sender PRO (BSC)</h2>

<div class="card">
Token:
<input id="token" value="0x8FA01B8B65378d086CF0Ba122eC5813a3aDB6Ac1">
Batch Contract:
<input id="batch" value="0xA83946b6C5Ec22F93B8303CE68E2f84D69b2DEb0">

<button class="blue" onclick="connect()">Conectar MetaMask</button>
<button onclick="switchBSC()">Trocar para BSC</button>

<div id="status"></div>
</div>

<div class="card">
<button onclick="loadToken()">Detectar Token</button>
<div id="tokenInfo"></div>

<button class="green" onclick="approveUnlimited()">Approve Ilimitado</button>
<button class="red" onclick="revoke()">Revogar</button>
</div>

<div class="card">
<textarea id="list" rows="8" placeholder="0x..., 0.1"></textarea>

<button onclick="preview()">Preview</button>
<div id="preview"></div>

<button class="green" onclick="send()">ENVIAR LOTE</button>
</div>

<div class="card log" id="log"></div>

<script>
// VARIÁVEIS GLOBAIS REAIS
let provider, signer, account;
let tokenContract = null;
let decimals = 18;

function log(msg){
  document.getElementById("log").innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
}

// =============================================
// 1. CONECTAR METAMASK
// =============================================
async function connect(){
  if(!window.ethereum){ alert("MetaMask ausente!"); return; }

  await window.ethereum.request({method:"eth_requestAccounts"});
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  account = await signer.getAddress();

  document.getElementById("status").innerText = "Conectado: " + account;
  log("Carteira conectada");
}

// =============================================
// 2. TROCAR PARA BSC
// =============================================
async function switchBSC(){
  await window.ethereum.request({
    method:"wallet_switchEthereumChain",
    params:[{chainId:"0x38"}]
  });
}

// =============================================
// 3. CARREGAR TOKEN
// =============================================
async function loadToken(){
  let addr = document.getElementById("token").value;

  tokenContract = new ethers.Contract(
    addr,
    [
      "function decimals() view returns(uint8)",
      "function symbol() view returns(string)",
      "function approve(address,uint256)"
    ],
    signer
  );

  decimals = await tokenContract.decimals();
  let sym = await tokenContract.symbol();

  document.getElementById("tokenInfo").innerText =
    `Token: ${sym} | Decimals: ${decimals}`;
  log("Token carregado");
}

// =============================================
// 4. APPROVE ILIMITADO (CORRIGIDO)
// =============================================
async function approveUnlimited(){
  if(!tokenContract){ alert("Primeiro clique em DETECTAR TOKEN"); return; }

  let batchAddr = document.getElementById("batch").value;

  try{
    const tx = await tokenContract.approve(batchAddr, ethers.MaxUint256);
    log("Approve enviado: " + tx.hash);
    await tx.wait();
    log("Approve confirmado!");
    alert("Approve Confirmado!");
  }catch(e){
    console.error(e);
    log("ERRO NO APPROVE: " + e.message);
    alert("ERRO NO APPROVE: " + e.message);
  }
}

// =============================================
// 5. REVOGAR APPROVE
// =============================================
async function revoke(){
  if(!tokenContract){ alert("Clique em DETECTAR TOKEN primeiro"); return; }

  let batchAddr = document.getElementById("batch").value;
  const tx = await tokenContract.approve(batchAddr, 0);
  await tx.wait();
  log("Allowance zerado");
}

// =============================================
// 6. PARSE DA LISTA (CORRIGIDO)
// =============================================
function parseList(){
  const txt = document.getElementById("list").value;
  const lines = txt.split("\n");

  let addrs = [];
  let amts = [];

  for(let line of lines){
    if(!line.trim()) continue;

    let [addr, val] = line.split(",");
    if(!addr || !val) throw new Error("Linha inválida: " + line);

    addr = addr.trim();
    val = val.trim();

    if(!ethers.isAddress(addr))
      throw new Error("Endereço inválido: " + addr);

    let amt = ethers.parseUnits(val, decimals);

    addrs.push(addr);
    amts.push(amt);
  }

  return {addrs, amts};
}

// =============================================
// 7. PREVIEW
// =============================================
function preview(){
  try{
    const {addrs, amts} = parseList();
    let total = 0;

    for(let a of amts){
      total += Number(ethers.formatUnits(a, decimals));
    }

    document.getElementById("preview").innerText =
      "Carteiras: " + addrs.length + " | Total: " + total;

  }catch(e){
    alert(e.message);
  }
}

// =============================================
// 8. ENVIAR LOTE (CORRIGIDO)
// =============================================
async function send(){
  try{
    const {addrs, amts} = parseList();

    let batch = new ethers.Contract(
      document.getElementById("batch").value,
      ["function batchERC20(address,address[],uint256[]) external"],
      signer
    );

    const tx = await batch.batchERC20(
      document.getElementById("token").value,
      addrs,
      amts,
      { gasLimit: 5000000 }
    );

    log("Tx enviada: " + tx.hash);
    await tx.wait();
    log("SUCESSO!");

  }catch(e){
    console.error(e);
    log("ERRO NO ENVIO: " + e.message);
    alert("ERRO: " + e.message);
  }
}
</script>

</body>
</html>
